x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

name: ${UNIBRIDGE_EDGE_PROJECT:-unibridge-edge}

services:
  edge:
    image: nginx:alpine
    container_name: unibridge-edge
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    cpus: "0.25"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    ports:
      - "${UNIBRIDGE_EDGE_PORT:-3000}:443"
    volumes:
      # generated/default.conf is rendered by scripts/deploy-bluegreen.sh
      # (render_edge_config) and is gitignored. Do NOT `docker compose -f
      # docker-compose.edge.yml up` directly before the script has rendered it:
      # Docker would create a *directory* at this path and nginx would fail to
      # start. Always drive the edge stack through deploy-bluegreen.sh.
      - ./deploy/edge/generated/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/etc/nginx/ssl/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/etc/nginx/ssl/tls.key:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O- https://localhost/healthz | grep -q '^ok$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - apihub-net

networks:
  apihub-net:
    external: true
    name: ${UNIBRIDGE_NETWORK_NAME:-unibridge-net}
