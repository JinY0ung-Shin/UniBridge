name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unibridge-ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Test
        run: npx vitest run

      - name: Type check & build
        run: npx tsc -b && npx vite build

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unibridge-service

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Migration check
        env:
          META_DB_URL: sqlite+aiosqlite:///./ci-alembic.db
        run: |
          alembic -c alembic.ini upgrade head
          alembic -c alembic.ini check

      - name: Test
        run: pytest tests/ -v --tb=short

  llm-converter:
    name: LLM converter (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-converter

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Test
        run: pytest -v --tb=short

  scripts:
    name: Shell scripts (syntax)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check shell syntax
        run: |
          bash -n backup/backup.sh backup/restore.sh backup/lib/*.sh keycloak/enable-self-registration.sh
          sh -n apisix/docker-entrypoint.sh keycloak/docker-entrypoint.sh unibridge-ui/entrypoint.sh

  e2e:
    name: Live E2E (deployment-gated)
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_LIVE_E2E == 'true' }}
    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live E2E
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://localhost:3000/api/llm' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_KEY_HEADER: ${{ vars.LLM_API_KEY_HEADER || 'apikey' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TLS_VERIFY: ${{ vars.LLM_TLS_VERIFY || 'false' }}
        run: pytest -v
