name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unibridge-ui

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: lts/*

      - run: npm install

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx vitest run

      - name: Type check & build
        run: npx tsc -b && npx vite build

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unibridge-service

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Migration check
        env:
          META_DB_URL: sqlite+aiosqlite:///./ci-alembic.db
        run: |
          alembic -c alembic.ini upgrade head
          alembic -c alembic.ini check

      - name: Test
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=70

  images:
    name: Container image build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: service
            context: ./unibridge-service
            file: ./unibridge-service/Dockerfile
          - name: ui
            context: ./unibridge-ui
            file: ./unibridge-ui/Dockerfile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: unibridge-${{ matrix.name }}:ci
