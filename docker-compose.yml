x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    environment:
      - ALLOW_NONE_AUTHENTICATION=${ETCD_ALLOW_NONE_AUTH:-no}
      - ETCD_ROOT_PASSWORD=${ETCD_ROOT_PASSWORD:-}
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    expose:
      - "2379"
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$ETCD_ROOT_PASSWORD\" ]; then etcdctl --user root:\"$ETCD_ROOT_PASSWORD\" auth status 2>/dev/null | grep -q 'Authentication Status: true' && etcdctl endpoint health --user root --password \"$ETCD_ROOT_PASSWORD\"; else etcdctl endpoint health; fi"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - apihub-net

  apisix:
    image: apache/apisix:3.15.0-debian
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    entrypoint: /opt/apisix-config/docker-entrypoint.sh
    expose:
      - "9080"
    ports:
      - "127.0.0.1:${APISIX_ADMIN_PORT:-9180}:9180"
    environment:
      - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY is required}
      - ETCD_USERNAME=root
      - ETCD_PASSWORD=${ETCD_ROOT_PASSWORD:-}
    volumes:
      - ./apisix/config.yaml:/opt/apisix-config/config.yaml:ro
      - ./apisix/docker-entrypoint.sh:/opt/apisix-config/docker-entrypoint.sh:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - apihub-net

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 2g
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.00"
    entrypoint: /opt/init/docker-entrypoint.sh
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required}
      - KC_HTTPS_PORT=8443
      - KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/conf/tls.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/conf/tls.key
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-apihub-service}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET:?KEYCLOAK_SERVICE_CLIENT_SECRET is required}
      - HOST_IP=${HOST_IP:-localhost}
      - UNIBRIDGE_UI_PORT=${UNIBRIDGE_UI_PORT:-3000}
      - KEYCLOAK_REDIRECT_URI=${KEYCLOAK_REDIRECT_URI:-}
      - KEYCLOAK_WEB_ORIGIN=${KEYCLOAK_WEB_ORIGIN:-}
      - KEYCLOAK_DEV_MODE=${KEYCLOAK_DEV_MODE:-false}
      # Grafana SSO client: secret lands in the realm template on first import,
      # redirect URI is kept in sync by the entrypoint on every boot.
      - GRAFANA_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET:-}
      - GRAFANA_PORT=${GRAFANA_PORT:-3300}
    ports:
      - "${KEYCLOAK_PORT:-8443}:8443"
    volumes:
      - ./keycloak/realm-export.json:/opt/init/realm-export.json.tpl:ro
      - ./keycloak/docker-entrypoint.sh:/opt/init/docker-entrypoint.sh:ro
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/opt/keycloak/conf/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/opt/keycloak/conf/tls.key:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - apihub-net

  unibridge-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    environment:
      - POSTGRES_DB=unibridge
      - POSTGRES_USER=unibridge
      - POSTGRES_PASSWORD=${UNIBRIDGE_DB_PASSWORD:?UNIBRIDGE_DB_PASSWORD is required}
    volumes:
      - unibridge-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unibridge -d unibridge"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  unibridge-service:
    build:
      context: ./unibridge-service
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        MS_PACKAGES_URL: ${MS_PACKAGES_URL:-https://packages.microsoft.com}
        MS_SKIP_GPG: ${MS_SKIP_GPG:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    init: true
    logging: *default-logging
    mem_limit: 512m
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    ports:
      - "127.0.0.1:${UNIBRIDGE_SERVICE_PORT:-8000}:8000"
    environment:
      - TZ=UTC
      - HOST_IP=${HOST_IP:-localhost}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT:-8443}
      - UNIBRIDGE_UI_PORT=${UNIBRIDGE_UI_PORT:-3000}
      - META_DB_URL=${META_DB_URL:-postgresql+asyncpg://unibridge:${UNIBRIDGE_DB_PASSWORD}@unibridge-db:5432/unibridge}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - JWT_SECRET=${JWT_SECRET}
      - ENABLE_DEV_TOKEN_ENDPOINT=${ENABLE_DEV_TOKEN_ENDPOINT:-false}
      - APISIX_ADMIN_URL=${APISIX_ADMIN_URL:-http://apisix:9180}
      - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY is required}
      - APISIX_PROVISION_ON_START=${APISIX_PROVISION_ON_START:-true}
      - APISIX_QUERY_ROUTE_TIMEOUT=${APISIX_QUERY_ROUTE_TIMEOUT:-310}
      - APISIX_QUERY_ROUTE_CONNECT_TIMEOUT=${APISIX_QUERY_ROUTE_CONNECT_TIMEOUT:-10}
      - APISIX_UNIBRIDGE_SERVICE_NODE=${APISIX_UNIBRIDGE_SERVICE_NODE:-unibridge-service:8000}
      - APISIX_LLM_CONVERTER_NODE=${APISIX_LLM_CONVERTER_NODE:-llm-converter:4001}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - NODE_EXPORTER_JOB=${NODE_EXPORTER_JOB:-nodes}
      - NODE_EXPORTER_DISK_MOUNTPOINTS=${NODE_EXPORTER_DISK_MOUNTPOINTS:-}
      - PROMETHEUS_FILE_SD_PATH=${PROMETHEUS_FILE_SD_PATH:-/etc/prometheus/file_sd/nodes.json}
      - EXTERNAL_SERVICES_JOB=${EXTERNAL_SERVICES_JOB:-external-services}
      - PROMETHEUS_SERVICES_FILE_SD_PATH=${PROMETHEUS_SERVICES_FILE_SD_PATH:-/etc/prometheus/file_sd/services.json}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-}
      - KEYCLOAK_JWT_AUDIENCE=${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
      - SSL_VERIFY=${SSL_VERIFY:-true}
      - SSL_CA_CERT_PATH=${SSL_CA_CERT_PATH:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - MSSQL_TRUST_SERVER_CERT=${MSSQL_TRUST_SERVER_CERT:-no}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - MAX_CONCURRENT_QUERIES=${MAX_CONCURRENT_QUERIES:-5}
      - NAS_ALLOWED_ROOTS=${NAS_ALLOWED_ROOTS:-${NAS_CONTAINER_PATH:-/mnt/nas}}
      - NAS_MAX_DOWNLOAD_BYTES=${NAS_MAX_DOWNLOAD_BYTES:-524288000}
      - NAS_MAX_LIST_ENTRIES=${NAS_MAX_LIST_ENTRIES:-5000}
      - NAS_LIST_DEFAULT_LIMIT=${NAS_LIST_DEFAULT_LIMIT:-500}
      - NAS_STREAM_CHUNK_BYTES=${NAS_STREAM_CHUNK_BYTES:-1048576}
      - NAS_MAX_PATH_BYTES=${NAS_MAX_PATH_BYTES:-4096}
      - NAS_FS_OP_TIMEOUT_SECONDS=${NAS_FS_OP_TIMEOUT_SECONDS:-10.0}
      - S3_MAX_WORKERS=${S3_MAX_WORKERS:-8}
      - S3_OP_TIMEOUT_SECONDS=${S3_OP_TIMEOUT_SECONDS:-30.0}
      - S3_CONNECT_TIMEOUT_SECONDS=${S3_CONNECT_TIMEOUT_SECONDS:-5.0}
      - S3_READ_TIMEOUT_SECONDS=${S3_READ_TIMEOUT_SECONDS:-30.0}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-apihub}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-apihub-service}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET:?KEYCLOAK_SERVICE_CLIENT_SECRET is required}
      - AWS_CA_BUNDLE=${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}
      - REQUESTS_CA_BUNDLE=${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}
      - SSL_CERT_FILE=${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}
    depends_on:
      unibridge-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      litellm:
        condition: service_started
      apisix:
        condition: service_started
    volumes:
      - unibridge-data:/app/data
      # Writes Prometheus file_sd targets from the MonitoredHost registry.
      - prometheus-file-sd:/etc/prometheus/file_sd
      - type: bind
        source: ${NAS_HOST_PATH:-/mnt/nas}
        target: ${NAS_CONTAINER_PATH:-/mnt/nas}
        read_only: true
        bind:
          create_host_path: true
      - ${HOST_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}:${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Cold start: this service only begins after keycloak is healthy, then
      # does its own boot work (incl. retrying APISIX provisioning for up to
      # ~100s while APISIX finishes its etcd sync), which can push /health past
      # a tight window. Give the first boot generous room.
      start_period: 180s
    networks:
      - apihub-net

  prometheus:
    image: prom/prometheus:v3.11.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=60d'
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-file-sd:/etc/prometheus/file_sd:ro
      - prometheus-data:/prometheus
    depends_on:
      apisix:
        condition: service_started
      blackbox-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apihub-net

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    cpus: "0.25"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    expose:
      - "9115"
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9115/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

  grafana:
    image: grafana/grafana-oss:12.4.3
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/unibridge-overview.json
      # SSO via the UniBridge Keycloak realm. Browser-facing auth_url derives
      # from HOST_IP like every other external URL; the server-side token
      # exchange uses Keycloak's in-network HTTP listener. api_url is omitted
      # on purpose: user info comes from the id_token, which avoids Keycloak's
      # userinfo issuer check tripping on the internal/external hostname split.
      - GF_SERVER_ROOT_URL=http://${HOST_IP:-localhost}:${GRAFANA_PORT:-3300}/
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=UniBridge SSO
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET:?GRAFANA_OAUTH_CLIENT_SECRET is required}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://${HOST_IP:-localhost}:${KEYCLOAK_PORT:-8443}/realms/${KEYCLOAK_REALM:-apihub}/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://keycloak:8080/realms/${KEYCLOAK_REALM:-apihub}/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - apihub-net

  litellm-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${LITELLM_DB_PASSWORD:?LITELLM_DB_PASSWORD is required}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.83.14-stable.patch.3
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$$PROXY_BASE_URL" ]; then
          export PROXY_BASE_URL="https://$$HOST_IP:$$LITELLM_PORT"
        fi
        exec litellm --config /app/config.yaml --port 4000 \
          --ssl_certfile_path /etc/ssl/tls.crt --ssl_keyfile_path /etc/ssl/tls.key
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      - DATABASE_URL=postgresql://litellm:${LITELLM_DB_PASSWORD:?LITELLM_DB_PASSWORD is required}@litellm-db:5432/litellm
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      - LITELLM_LOG=ERROR
      - STORE_MODEL_IN_DB=true
      - FORWARDED_ALLOW_IPS=*
      - SSL_VERIFY=${SSL_VERIFY:-true}
      - HOST_IP=${HOST_IP:-localhost}
      - LITELLM_PORT=${LITELLM_PORT:-4000}
      - PROXY_BASE_URL=${PROXY_BASE_URL:-}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/etc/ssl/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/etc/ssl/tls.key:ro
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import ssl,urllib.request;urllib.request.urlopen('https://localhost:4000/health/liveliness', context=ssl._create_unverified_context())\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - apihub-net

  llm-converter:
    build:
      context: ./llm-converter
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    init: true
    logging: *default-logging
    mem_limit: 256m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    environment:
      - LITELLM_URL=${LITELLM_CONVERTER_UPSTREAM:-https://litellm:4000}
      # Pin the LiteLLM self-signed cert as a CA (chain validated, hostname
      # check off since the cert is bound to HOST_IP). Set CONVERTER_TLS_CA="" in
      # .env to fall back to CONVERTER_TLS_VERIFY — the ``-`` (not ``:-``) keeps
      # an explicit empty value instead of re-applying the default.
      - CONVERTER_TLS_CA=${CONVERTER_TLS_CA-/etc/ssl/litellm-ca.crt}
      - CONVERTER_TLS_VERIFY=${CONVERTER_TLS_VERIFY:-false}
      # Upstream httpx timeouts (seconds; read 0 = unbounded for long streams).
      - CONVERTER_REQUEST_TIMEOUT=${CONVERTER_REQUEST_TIMEOUT:-0}
      - CONVERTER_CONNECT_TIMEOUT=${CONVERTER_CONNECT_TIMEOUT:-10}
      - CONVERTER_WRITE_TIMEOUT=${CONVERTER_WRITE_TIMEOUT:-120}
      - CONVERTER_POOL_TIMEOUT=${CONVERTER_POOL_TIMEOUT:-10}
      # Idle SSE keepalive (seconds) so proxies don't drop silent streams; 0 disables.
      - CONVERTER_SSE_HEARTBEAT_SECONDS=${CONVERTER_SSE_HEARTBEAT_SECONDS:-15}
      # In-memory previous_response_id store (TTL seconds / max conversations /
      # total byte budget; 0 disables the byte budget).
      - CONVERTER_RESPONSE_STORE_TTL=${CONVERTER_RESPONSE_STORE_TTL:-3600}
      - CONVERTER_RESPONSE_STORE_MAX=${CONVERTER_RESPONSE_STORE_MAX:-10000}
      - CONVERTER_RESPONSE_STORE_MAX_BYTES=${CONVERTER_RESPONSE_STORE_MAX_BYTES:-268435456}
      # Surface upstream reasoning_content as Responses reasoning items.
      - CONVERTER_EMIT_REASONING=${CONVERTER_EMIT_REASONING:-true}
      # Opt-in verbose tracing: logs the full incoming /v1/messages body and each
      # decisive upstream chunk (finish_reason + tool_calls) at INFO. Diagnostic
      # only; leave off in normal operation.
      - CONVERTER_TRACE=${CONVERTER_TRACE:-false}
    expose:
      - "4001"
    volumes:
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/etc/ssl/litellm-ca.crt:ro
    depends_on:
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

  unibridge-ui:
    build:
      context: ./unibridge-ui
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        VITE_KEYCLOAK_URL: ${KEYCLOAK_EXTERNAL_URL:-}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-apihub}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
        HOST_IP: ${HOST_IP:-localhost}
        KEYCLOAK_PORT: ${KEYCLOAK_PORT:-8443}
    restart: unless-stopped
    init: true
    logging: *default-logging
    mem_limit: 128m
    cpus: "0.25"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    environment:
      - SSL_VERIFY=${SSL_VERIFY:-true}
      - HOST_IP=${HOST_IP:-localhost}
      - KEYCLOAK_EXTERNAL_URL=${KEYCLOAK_EXTERNAL_URL:-}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT:-8443}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-apihub}
      - KEYCLOAK_JWT_AUDIENCE=${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
      - LITELLM_PORT=${LITELLM_PORT:-4000}
      - GRAFANA_PORT=${GRAFANA_PORT:-3300}
      - UNIBRIDGE_SERVICE_UPSTREAM=${UNIBRIDGE_SERVICE_UPSTREAM:-unibridge-service}
      - APISIX_UPSTREAM=${APISIX_UPSTREAM:-apisix}
    ports:
      - "${UNIBRIDGE_UI_PORT:-3000}:443"
    volumes:
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/etc/nginx/ssl/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/etc/nginx/ssl/tls.key:ro
    depends_on:
      # nginx resolves the backend lazily at request time (see nginx.conf
      # `resolver` + variable proxy_pass), so the UI does not need the backend
      # healthy — only created — to start. Gating on service_healthy left the UI
      # stuck in `Created` whenever unibridge-service flapped during first boot.
      unibridge-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O- https://localhost/healthz | grep -q '^ok$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

networks:
  apihub-net:
    driver: bridge

volumes:
  unibridge-data:
  etcd-data:
  prometheus-data:
  grafana-data:
  # Prometheus file_sd targets written by unibridge-service from the
  # MonitoredHost registry; mounted read-only into Prometheus.
  prometheus-file-sd:
  keycloak-db-data:
  litellm-db-data:
  unibridge-db-data:
