services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    expose:
      - "2379"
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

  apisix:
    image: apache/apisix:3.15.0-debian
    ports:
      - "${APISIX_PORT:-9080}:9080"
      - "${APISIX_SSL_PORT:-9443}:9443"
      - "${APISIX_ADMIN_PORT:-9180}:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - apihub-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:-admin}
      - KC_HTTP_PORT=8080
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - apihub-net

  query-service:
    build:
      context: ./query-service
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    ports:
      - "${QUERY_SERVICE_PORT:-8000}:8000"
    environment:
      - META_DB_URL=${META_DB_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENABLE_DEV_TOKEN_ENDPOINT=${ENABLE_DEV_TOKEN_ENDPOINT:-false}
      - APISIX_ADMIN_URL=${APISIX_ADMIN_URL:-http://apisix:9180}
      - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:-edd1c9f034335f136f87ad84b625c8f1}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-http://localhost:8080/realms/apihub}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/apihub/protocol/openid-connect/certs}
      # KEYCLOAK_ISSUER_URL must match the URL the browser uses to access Keycloak
      # (since Keycloak embeds the browser-facing URL as the JWT issuer claim)
      - KEYCLOAK_JWT_AUDIENCE=${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - query-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apihub-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      apisix:
        condition: service_started
    networks:
      - apihub-net

  query-ui:
    build:
      context: ./query-ui
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        VITE_KEYCLOAK_URL: ${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}
    ports:
      - "${QUERY_UI_PORT:-3000}:80"
    depends_on:
      query-service:
        condition: service_healthy
    networks:
      - apihub-net

networks:
  apihub-net:
    driver: bridge

volumes:
  query-data:
  etcd-data:
  prometheus-data:
