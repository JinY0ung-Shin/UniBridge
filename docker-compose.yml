services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    expose:
      - "2379"
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

  apisix:
    image: apache/apisix:3.15.0-debian
    expose:
      - "9080"
    ports:
      - "127.0.0.1:${APISIX_ADMIN_PORT:-9180}:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - apihub-net

  keycloak-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    entrypoint: /opt/init/docker-entrypoint.sh
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:-admin}
      - KC_HTTPS_PORT=8443
      - KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/conf/tls.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/conf/tls.key
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-apihub-service}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET:-}
      - HOST_IP=${HOST_IP:-localhost}
      - UNIBRIDGE_UI_PORT=${UNIBRIDGE_UI_PORT:-3000}
      - KEYCLOAK_REDIRECT_URI=${KEYCLOAK_REDIRECT_URI:-}
      - KEYCLOAK_WEB_ORIGIN=${KEYCLOAK_WEB_ORIGIN:-}
    ports:
      - "${KEYCLOAK_PORT:-8443}:8443"
    volumes:
      - ./keycloak/realm-export.json:/opt/init/realm-export.json.tpl:ro
      - ./keycloak/docker-entrypoint.sh:/opt/init/docker-entrypoint.sh:ro
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/opt/keycloak/conf/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/opt/keycloak/conf/tls.key:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - apihub-net

  unibridge-service:
    build:
      context: ./unibridge-service
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    ports:
      - "127.0.0.1:${UNIBRIDGE_SERVICE_PORT:-8000}:8000"
    environment:
      - HOST_IP=${HOST_IP:-localhost}
      - KEYCLOAK_PORT=${KEYCLOAK_PORT:-8443}
      - UNIBRIDGE_UI_PORT=${UNIBRIDGE_UI_PORT:-3000}
      - META_DB_URL=${META_DB_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENABLE_DEV_TOKEN_ENDPOINT=${ENABLE_DEV_TOKEN_ENDPOINT:-false}
      - APISIX_ADMIN_URL=${APISIX_ADMIN_URL:-http://apisix:9180}
      - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-}
      - KEYCLOAK_JWT_AUDIENCE=${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
      - SSL_VERIFY=${SSL_VERIFY:-true}
      - SSL_CA_CERT_PATH=${SSL_CA_CERT_PATH:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - MSSQL_TRUST_SERVER_CERT=${MSSQL_TRUST_SERVER_CERT:-no}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - MAX_CONCURRENT_QUERIES=${MAX_CONCURRENT_QUERIES:-5}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-apihub}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-apihub-service}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET:-}
    depends_on:
      keycloak:
        condition: service_healthy
      litellm:
        condition: service_started
    volumes:
      - unibridge-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apihub-net

  prometheus:
    image: prom/prometheus:v3.11.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=60d'
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      apisix:
        condition: service_started
    networks:
      - apihub-net

  litellm-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${LITELLM_DB_PASSWORD:-litellm}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.80.8-stable
    command: --config /app/config.yaml --port 4000
    environment:
      - DATABASE_URL=postgresql://litellm:${LITELLM_DB_PASSWORD:-litellm}@litellm-db:5432/litellm
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_LOG=ERROR
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - apihub-net

  unibridge-ui:
    build:
      context: ./unibridge-ui
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        VITE_KEYCLOAK_URL: ${KEYCLOAK_EXTERNAL_URL:-}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-apihub}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_JWT_AUDIENCE:-apihub-ui}
        HOST_IP: ${HOST_IP:-localhost}
        KEYCLOAK_PORT: ${KEYCLOAK_PORT:-8443}
    ports:
      - "${UNIBRIDGE_UI_PORT:-3000}:443"
    volumes:
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/etc/nginx/ssl/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/etc/nginx/ssl/tls.key:ro
    depends_on:
      unibridge-service:
        condition: service_healthy
    networks:
      - apihub-net

networks:
  apihub-net:
    driver: bridge

volumes:
  unibridge-data:
  etcd-data:
  prometheus-data:
  keycloak-db-data:
  litellm-db-data:
