apisix:
  node_listen: 9080
  enable_admin: true

deployment:
  admin:
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
    admin_listen:
      ip: 0.0.0.0
      port: 9180
    allow_admin:
      - 0.0.0.0/0
  etcd:
    host:
      - "http://etcd:2379"

plugin_attr:
  prometheus:
    export_addr:
      ip: 0.0.0.0
      port: 9091

plugins:
  - jwt-auth
  - key-auth
  - proxy-rewrite
  - prometheus
  - http-logger
  - error-log-logger
  - ip-restriction
  - limit-req
  - limit-count
  - cors
