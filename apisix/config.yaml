apisix:
  node_listen:
    - ip: 0.0.0.0
      port: 9080
  enable_admin: true
  enable_ipv6: false

deployment:
  admin:
    admin_key:
      - name: admin
        key: "${{APISIX_ADMIN_KEY}}"
        role: admin
    admin_listen:
      ip: 0.0.0.0
      port: 9180
    allow_admin:
      - 127.0.0.1/32
      - 172.16.0.0/12   # Docker internal networks
  etcd:
    host:
      - "http://etcd:2379"

plugin_attr:
  prometheus:
    export_addr:
      ip: 0.0.0.0
      port: 9091

plugins:
  - jwt-auth
  - key-auth
  - consumer-restriction
  - proxy-rewrite
  - prometheus
  - http-logger
  - error-log-logger
  - ip-restriction
  - limit-req
  - limit-count
  - cors
