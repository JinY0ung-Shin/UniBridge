global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'apisix'
    metrics_path: '/apisix/prometheus/metrics'
    static_configs:
      - targets: ['apisix:9091']

  - job_name: 'unibridge-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['unibridge-service:8000']

  - job_name: 'litellm'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'infra-db-tcp'
    metrics_path: '/probe'
    params:
      module: ['tcp_connect']
    static_configs:
      - targets: ['keycloak-db:5432']
        labels:
          db: 'keycloak-db'
      - targets: ['litellm-db:5432']
        labels:
          db: 'litellm-db'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
