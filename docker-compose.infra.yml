x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

name: ${UNIBRIDGE_INFRA_PROJECT:-unibridge-infra}

services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    environment:
      - ALLOW_NONE_AUTHENTICATION=${ETCD_ALLOW_NONE_AUTH:-no}
      - ETCD_ROOT_PASSWORD=${ETCD_ROOT_PASSWORD:-}
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    expose:
      - "2379"
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$ETCD_ROOT_PASSWORD\" ]; then etcdctl --user root:\"$ETCD_ROOT_PASSWORD\" auth status 2>/dev/null | grep -q 'Authentication Status: true' && etcdctl endpoint health --user root --password \"$ETCD_ROOT_PASSWORD\"; else etcdctl endpoint health; fi"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - apihub-net

  apisix:
    image: apache/apisix:3.15.0-debian
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    entrypoint: /opt/apisix-config/docker-entrypoint.sh
    expose:
      - "9080"
    ports:
      - "127.0.0.1:${APISIX_ADMIN_PORT:-9180}:9180"
    environment:
      - APISIX_ADMIN_KEY=${APISIX_ADMIN_KEY:?APISIX_ADMIN_KEY is required}
      - ETCD_USERNAME=root
      - ETCD_PASSWORD=${ETCD_ROOT_PASSWORD:-}
    volumes:
      - ./apisix/config.yaml:/opt/apisix-config/config.yaml:ro
      - ./apisix/docker-entrypoint.sh:/opt/apisix-config/docker-entrypoint.sh:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - apihub-net

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 2g
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.00"
    entrypoint: /opt/init/docker-entrypoint.sh
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_ADMIN_USER:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required}
      - KC_HTTPS_PORT=8443
      - KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/conf/tls.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/conf/tls.key
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-apihub-service}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET:?KEYCLOAK_SERVICE_CLIENT_SECRET is required}
      - HOST_IP=${HOST_IP:-localhost}
      - UNIBRIDGE_UI_PORT=${UNIBRIDGE_EDGE_PORT:-${UNIBRIDGE_UI_PORT:-3000}}
      - KEYCLOAK_REDIRECT_URI=${KEYCLOAK_REDIRECT_URI:-}
      - KEYCLOAK_WEB_ORIGIN=${KEYCLOAK_WEB_ORIGIN:-}
      - KEYCLOAK_DEV_MODE=${KEYCLOAK_DEV_MODE:-false}
    ports:
      - "${KEYCLOAK_PORT:-8443}:8443"
    volumes:
      - ./keycloak/realm-export.json:/opt/init/realm-export.json.tpl:ro
      - ./keycloak/docker-entrypoint.sh:/opt/init/docker-entrypoint.sh:ro
      - ${TLS_CERT_PATH:-./certs/tls.crt}:/opt/keycloak/conf/tls.crt:ro
      - ${TLS_KEY_PATH:-./certs/tls.key}:/opt/keycloak/conf/tls.key:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - apihub-net

  prometheus:
    image: prom/prometheus:v3.11.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=60d'
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-file-sd:/etc/prometheus/file_sd:ro
      - prometheus-data:/prometheus
    depends_on:
      apisix:
        condition: service_started
      blackbox-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apihub-net

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    cpus: "0.25"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    expose:
      - "9115"
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9115/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apihub-net

  unibridge-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: "0.50"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    environment:
      - POSTGRES_DB=unibridge
      - POSTGRES_USER=unibridge
      - POSTGRES_PASSWORD=${UNIBRIDGE_DB_PASSWORD:?UNIBRIDGE_DB_PASSWORD is required}
    volumes:
      - unibridge-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unibridge -d unibridge"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apihub-net

  bifrost:
    image: maximhq/bifrost:v1.5.16
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    cpus: "1.00"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.00"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Exposed on all interfaces like the former LiteLLM gateway. BIFROST_PORT
      # falls back to the legacy LITELLM_PORT so existing .env files migrate with
      # no edit. To restrict to loopback, prefix the value with 127.0.0.1: in .env.
      - "${BIFROST_PORT:-${LITELLM_PORT:-8080}}:8080"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - LOG_LEVEL=${BIFROST_LOG_LEVEL:-info}
      - LOG_STYLE=${BIFROST_LOG_STYLE:-json}
      - BIFROST_ENCRYPTION_KEY=${BIFROST_ENCRYPTION_KEY:?BIFROST_ENCRYPTION_KEY is required}
      - BIFROST_VIRTUAL_KEY=${BIFROST_VIRTUAL_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - bifrost-data:/app/data
      - ./bifrost/config.json:/app/data/config.json:ro
      # Air-gapped pricing/catalog data served via file:// in config.json so
      # bifrost never needs to reach getbifrost.ai at boot (see config.json).
      - ./bifrost/datasheet.json:/app/data/datasheet.json:ro
      - ./bifrost/model-parameters.json:/app/data/model-parameters.json:ro
      - ./bifrost/mcp-library.json:/app/data/mcp-library.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - apihub-net

networks:
  apihub-net:
    name: ${UNIBRIDGE_NETWORK_NAME:-unibridge-net}
    driver: bridge

volumes:
  etcd-data:
    name: ${ETCD_DATA_VOLUME:-unibridge_etcd-data}
  prometheus-data:
    name: ${PROMETHEUS_DATA_VOLUME:-unibridge_prometheus-data}
  prometheus-file-sd:
    name: ${PROMETHEUS_FILE_SD_VOLUME:-unibridge_prometheus-file-sd}
  keycloak-db-data:
    name: ${KEYCLOAK_DB_DATA_VOLUME:-unibridge_keycloak-db-data}
  bifrost-data:
    name: ${BIFROST_DATA_VOLUME:-unibridge_bifrost-data}
  unibridge-db-data:
    name: ${UNIBRIDGE_DB_DATA_VOLUME:-unibridge_unibridge-db-data}
