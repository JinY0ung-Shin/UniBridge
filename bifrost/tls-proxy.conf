# TLS termination in front of Bifrost, which serves plain HTTP only (it has no
# built-in HTTPS — inbound TLS is expected to be terminated by a front proxy).
# This mirrors how the former LiteLLM gateway exposed its admin UI/API over
# HTTPS directly on its published port. Fronts both the Bifrost admin UI and the
# LLM API, so it must pass through SSE streams and WebSocket upgrades untouched.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;

    # No request-body cap: LLM payloads can be large.
    client_max_body_size 0;

    location / {
        # Resolve the bifrost service name at request time via Docker's embedded
        # DNS so a bifrost container recreate (restart / blue-green) doesn't leave
        # nginx pinned to a stale IP. proxy_pass with a variable forces this.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $bifrost_upstream http://bifrost:8080;
        proxy_pass $bifrost_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket upgrade (admin UI live views).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Stream responses (SSE) instead of buffering; keep long-lived streams open.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
