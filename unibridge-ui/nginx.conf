map $http_upgrade $connection_upgrade {
    default "";
    "websocket" "upgrade";
}

server {
    listen 443 ssl;
    # Allow multi-image uploads (default 1m rejects ~2–3 MB payloads with 413)
    client_max_body_size 100m;
    ssl_certificate /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 497 =301 https://$host:$server_port$request_uri;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry HTML must revalidate every request so new deploys are picked
    # up immediately (otherwise the cached index.html keeps pointing at
    # the old hashed asset filenames). nginx silently drops the server-level
    # `add_header` directives whenever a location declares its own, so the
    # security headers must be repeated here verbatim.
    location = /index.html {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    # Hashed build artifacts are content-addressed — safe to cache forever.
    location /assets/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # runtime-config.js is regenerated by entrypoint.sh from env vars on
    # every container start — caching it would freeze stale endpoints.
    location = /runtime-config.js {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
    location = /grafana {
        return 301 /grafana/;
    }
    location ^~ /grafana/ {
        set $grafana_upstream "__GRAFANA_UPSTREAM__";
        proxy_pass http://$grafana_upstream:3000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    location = /_api/metrics {
        return 404;
    }
    location ^~ /_api/metrics/ {
        return 404;
    }
    location /_api/ {
        set $unibridge_upstream "__UNIBRIDGE_SERVICE_UPSTREAM__";
        rewrite ^/_api/(.*)$ /$1 break;
        proxy_pass http://$unibridge_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip APISIX headers to prevent spoofing — only APISIX may set these
        proxy_set_header X-Consumer-Username "";
        proxy_set_header X-Consumer-Custom-Id "";
    }
    location /api/ {
        set $apisix_upstream "__APISIX_UPSTREAM__";
        proxy_pass http://$apisix_upstream:9080$request_uri;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
